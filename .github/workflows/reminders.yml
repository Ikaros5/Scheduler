name: Weekly Push Notifications Reminder

on:
  schedule:
    # Runs at 18:00 UTC every day, which is 19:00 CET (standard) / 20:00 CEST (summer)
    - cron: '0 18 * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  ping-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the Reminders API
        run: |
          # Strip trailing slash from SITE_URL if present to avoid 404 double-slashes
          SITE_URL="${{ secrets.SITE_URL }}"
          SITE_URL="${SITE_URL%/}"
          curl -f -X GET "${SITE_URL}/api/cron/reminders?secret=${{ secrets.CRON_SECRET }}"
